<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do App — Ashlin L</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0e14;
      --surface: #16161e;
      --card:    #1e1e28;
      --border:  rgba(255,255,255,0.07);
      --accent:  #6c63ff;
      --green:   #4ade80;
      --red:     #f87171;
      --yellow:  #fbbf24;
      --text:    #ededf5;
      --muted:   rgba(237,237,245,0.4);
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* HEADER */
    .header {
      max-width: 680px; margin: 0 auto 2rem;
      text-align: center;
      animation: fadeDown 0.5s ease both;
    }
    .header-tag {
      display: inline-block;
      font-size: 0.62rem; font-weight: 600;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--muted);
      padding: 0.3rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 999px; margin-bottom: 0.75rem;
    }
    .header h1 {
      font-size: 2rem; font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header h1 span { color: var(--accent); }
    .header p { font-size: 0.85rem; color: var(--muted); margin-top: 0.4rem; }

    /* STATS BAR */
    .stats-bar {
      max-width: 680px; margin: 0 auto 1.5rem;
      display: flex; gap: 1rem;
      animation: fadeUp 0.5s ease 0.1s both;
    }
    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem;
      text-align: center;
    }
    .stat-num {
      font-size: 1.8rem; font-weight: 700; line-height: 1;
    }
    .stat-lbl { font-size: 0.7rem; color: var(--muted); margin-top: 0.25rem; }
    .s-total  .stat-num { color: var(--accent); }
    .s-pending .stat-num { color: var(--yellow); }
    .s-done   .stat-num { color: var(--green); }

    /* INPUT CARD */
    .input-card {
      max-width: 680px; margin: 0 auto 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem;
      animation: fadeUp 0.5s ease 0.15s both;
    }
    .input-card label {
      display: block;
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.75rem;
    }
    .input-row {
      display: flex; gap: 0.75rem;
    }
    .task-input {
      flex: 1;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem; color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .task-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
    }
    .task-input::placeholder { color: var(--muted); }
    .add-btn {
      background: var(--accent);
      border: none; border-radius: 10px;
      padding: 0.85rem 1.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem; font-weight: 700;
      color: white; cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center;
    }
    .add-btn:hover { background: #5a52e0; transform: translateY(-1px); }
    .add-btn:active { transform: translateY(0); }

    /* TABS */
    .tabs {
      max-width: 680px; margin: 0 auto 1.25rem;
      display: flex; gap: 0.5rem;
      animation: fadeUp 0.5s ease 0.2s both;
    }
    .tab-btn {
      flex: 1; padding: 0.7rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem; font-weight: 600;
      color: var(--muted); cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center;
      justify-content: center; gap: 0.5rem;
    }
    .tab-btn.active {
      background: var(--card);
      border-color: var(--accent);
      color: var(--text);
    }
    .tab-count {
      background: var(--accent);
      color: white; font-size: 0.65rem;
      font-weight: 700; padding: 0.15rem 0.5rem;
      border-radius: 999px; min-width: 1.2rem;
      text-align: center;
    }
    .tab-btn:not(.active) .tab-count { background: rgba(255,255,255,0.1); }

    /* TASK LIST */
    .task-section {
      max-width: 680px; margin: 0 auto;
      animation: fadeUp 0.5s ease 0.25s both;
    }
    .task-list { display: flex; flex-direction: column; gap: 0.6rem; }

    .empty-state {
      text-align: center; padding: 3rem 1rem;
      color: var(--muted); font-size: 0.88rem;
    }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* TASK ITEM */
    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.25rem;
      display: flex; align-items: flex-start; gap: 0.75rem;
      transition: all 0.25s; position: relative;
      animation: slideIn 0.3s ease both;
    }
    @keyframes slideIn {
      from { opacity:0; transform: translateY(8px); }
      to   { opacity:1; transform: none; }
    }
    .task-item:hover { border-color: rgba(108,99,255,0.25); }
    .task-item.completed {
      opacity: 0.6;
      border-color: rgba(74,222,128,0.15);
    }

    /* CHECKBOX */
    .task-check {
      width: 20px; height: 20px; flex-shrink: 0;
      border: 2px solid var(--border);
      border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; margin-top: 1px;
      background: transparent;
    }
    .task-check:hover { border-color: var(--accent); }
    .task-item.completed .task-check {
      background: var(--green); border-color: var(--green);
    }
    .task-check::after {
      content: '✓'; font-size: 0.7rem; font-weight: 700;
      color: white; opacity: 0; transition: opacity 0.2s;
    }
    .task-item.completed .task-check::after { opacity: 1; }

    /* TASK BODY */
    .task-body { flex: 1; min-width: 0; }
    .task-text {
      font-size: 0.95rem; font-weight: 500;
      line-height: 1.4; word-break: break-word;
      transition: all 0.2s;
    }
    .task-item.completed .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }
    .task-meta {
      display: flex; align-items: center; gap: 0.75rem;
      margin-top: 0.4rem;
    }
    .task-date {
      font-size: 0.7rem; color: var(--muted);
    }
    .task-badge {
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 0.15rem 0.5rem; border-radius: 4px;
    }
    .badge-pending { background: rgba(251,191,36,0.15); color: var(--yellow); }
    .badge-done    { background: rgba(74,222,128,0.15); color: var(--green); }

    /* EDITING */
    .edit-input {
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--accent);
      border-radius: 8px; padding: 0.5rem 0.75rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem; color: var(--text);
      outline: none; margin-bottom: 0.4rem;
    }
    .edit-actions { display: flex; gap: 0.5rem; }
    .edit-save, .edit-cancel {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem; font-weight: 600;
      padding: 0.3rem 0.75rem; border-radius: 6px;
      border: none; cursor: pointer; transition: all 0.2s;
    }
    .edit-save   { background: var(--accent); color: white; }
    .edit-cancel { background: var(--card); color: var(--muted); border: 1px solid var(--border); }

    /* TASK ACTIONS */
    .task-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .action-btn {
      width: 30px; height: 30px;
      border: 1px solid var(--border);
      border-radius: 7px; background: var(--card);
      font-size: 0.75rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; color: var(--muted);
    }
    .action-btn:hover { transform: scale(1.1); }
    .edit-btn:hover   { border-color: var(--accent); color: var(--accent); }
    .delete-btn:hover { border-color: var(--red); color: var(--red); background: rgba(248,113,113,0.1); }

    /* CLEAR COMPLETED */
    .clear-btn {
      display: block; margin: 1.5rem auto 0;
      background: transparent;
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px; padding: 0.6rem 1.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.78rem; font-weight: 600;
      color: var(--red); cursor: pointer;
      transition: all 0.2s;
    }
    .clear-btn:hover { background: rgba(248,113,113,0.08); }

    /* FOOTER */
    footer {
      text-align: center; margin-top: 3rem;
      font-size: 0.72rem; color: var(--muted);
    }
    footer strong { color: var(--accent); }

    /* ANIMATIONS */
    @keyframes fadeUp   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:none} }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-tag">Level 2 · Task 03 · Oasis Infobyte</div>
    <h1>My <span>To-Do</span> App</h1>
    <p>Add tasks, mark them done, stay organised</p>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat s-total">
      <div class="stat-num" id="totalCount">0</div>
      <div class="stat-lbl">Total Tasks</div>
    </div>
    <div class="stat s-pending">
      <div class="stat-num" id="pendingCount">0</div>
      <div class="stat-lbl">Pending</div>
    </div>
    <div class="stat s-done">
      <div class="stat-num" id="doneCount">0</div>
      <div class="stat-lbl">Completed</div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-card">
    <label for="taskInput">Add a new task</label>
    <div class="input-row">
      <input type="text" id="taskInput" class="task-input" placeholder="What needs to be done?" maxlength="120"/>
      <button class="add-btn" onclick="addTask()">＋</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-all" onclick="switchTab('all')">
      All <span class="tab-count" id="cnt-all">0</span>
    </button>
    <button class="tab-btn" id="tab-pending" onclick="switchTab('pending')">
      ⏳ Pending <span class="tab-count" id="cnt-pending">0</span>
    </button>
    <button class="tab-btn" id="tab-completed" onclick="switchTab('completed')">
      ✓ Completed <span class="tab-count" id="cnt-completed">0</span>
    </button>
  </div>

  <!-- TASK LIST -->
  <div class="task-section">
    <div class="task-list" id="taskList"></div>
    <button class="clear-btn" id="clearBtn" onclick="clearCompleted()" style="display:none">
      🗑 Clear Completed Tasks
    </button>
  </div>

  <footer>
    Built by <strong>Ashlin L</strong> · AICTE Oasis Infobyte · 2026
  </footer>

  <script>
    let tasks = [];
    let currentTab = 'all';
    let editingId = null;

    function getTime() {
      const now = new Date();
      return now.toLocaleString('en-IN', {
        day:'2-digit', month:'short', year:'numeric',
        hour:'2-digit', minute:'2-digit', hour12:true
      });
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text  = input.value.trim();
      if (!text) { input.focus(); return; }

      tasks.unshift({
        id: Date.now(),
        text,
        completed: false,
        addedAt: getTime(),
        completedAt: null
      });

      input.value = '';
      input.focus();
      render();
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      task.completed = !task.completed;
      task.completedAt = task.completed ? getTime() : null;
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function startEdit(id) {
      editingId = id;
      render();
      const el = document.getElementById('edit-' + id);
      if (el) { el.focus(); el.select(); }
    }

    function saveEdit(id) {
      const el = document.getElementById('edit-' + id);
      if (!el) return;
      const val = el.value.trim();
      if (val) {
        const task = tasks.find(t => t.id === id);
        if (task) task.text = val;
      }
      editingId = null;
      render();
    }

    function cancelEdit() {
      editingId = null;
      render();
    }

    function clearCompleted() {
      tasks = tasks.filter(t => !t.completed);
      render();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('taskList');
      const total     = tasks.length;
      const pending   = tasks.filter(t => !t.completed).length;
      const completed = tasks.filter(t =>  t.completed).length;

      // Update stats
      document.getElementById('totalCount').textContent   = total;
      document.getElementById('pendingCount').textContent  = pending;
      document.getElementById('doneCount').textContent     = completed;
      document.getElementById('cnt-all').textContent       = total;
      document.getElementById('cnt-pending').textContent   = pending;
      document.getElementById('cnt-completed').textContent = completed;

      // Show/hide clear button
      document.getElementById('clearBtn').style.display = completed > 0 ? 'block' : 'none';

      // Filter tasks
      let filtered = tasks;
      if (currentTab === 'pending')   filtered = tasks.filter(t => !t.completed);
      if (currentTab === 'completed') filtered = tasks.filter(t =>  t.completed);

      // Empty state
      if (filtered.length === 0) {
        const msgs = {
          all:       ['📝', 'No tasks yet!', 'Add your first task above.'],
          pending:   ['🎉', 'All caught up!', 'No pending tasks right now.'],
          completed: ['⏳', 'Nothing completed yet', 'Mark tasks done to see them here.']
        };
        const [icon, title, sub] = msgs[currentTab];
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">${icon}</div><strong>${title}</strong><p>${sub}</p></div>`;
        return;
      }

      list.innerHTML = filtered.map(task => {
        const isEditing = editingId === task.id;
        return `
          <div class="task-item ${task.completed ? 'completed' : ''}" id="task-${task.id}">
            <div class="task-check" onclick="toggleTask(${task.id})"></div>
            <div class="task-body">
              ${isEditing ? `
                <input class="edit-input" id="edit-${task.id}" value="${task.text.replace(/"/g,'&quot;')}"
                  onkeydown="if(event.key==='Enter')saveEdit(${task.id});if(event.key==='Escape')cancelEdit()"/>
                <div class="edit-actions">
                  <button class="edit-save" onclick="saveEdit(${task.id})">Save</button>
                  <button class="edit-cancel" onclick="cancelEdit()">Cancel</button>
                </div>
              ` : `
                <div class="task-text">${task.text}</div>
                <div class="task-meta">
                  <span class="task-date">Added: ${task.addedAt}</span>
                  ${task.completedAt ? `<span class="task-date">Done: ${task.completedAt}</span>` : ''}
                  <span class="task-badge ${task.completed ? 'badge-done' : 'badge-pending'}">
                    ${task.completed ? 'Done' : 'Pending'}
                  </span>
                </div>
              `}
            </div>
            ${!isEditing ? `
              <div class="task-actions">
                ${!task.completed ? `<button class="action-btn edit-btn" onclick="startEdit(${task.id})" title="Edit">✏️</button>` : ''}
                <button class="action-btn delete-btn" onclick="deleteTask(${task.id})" title="Delete">🗑</button>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    // Enter key to add task
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>

</body>
</html>
